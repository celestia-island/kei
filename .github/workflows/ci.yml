name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  check-bsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cd bsp && cargo check

  check-vendored-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show vendored upstream versions
        run: |
          echo "=== Upstream asterinas ==="
          cat .vendored-upstream 2>/dev/null || echo "  (not vendored yet — run 'just vendor')"
          echo ""
          echo "=== ARM64 source ==="
          cat .vendored-arm64 2>/dev/null || echo "  (not pulled yet — run 'just pull-arm64')"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
