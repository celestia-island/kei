name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  check-bsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cd bsp && cargo check

  list-patches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "=== ARM64 Patches ==="
          cat patches/arm64/series 2>/dev/null | grep -v '^#' | grep -v '^$' || echo "  (empty)"
