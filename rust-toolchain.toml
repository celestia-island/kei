[toolchain]
# nightly required: ostd uses #![feature(alloc_error_handler, allocator_api,
# min_specialization, ...)] — bare-metal OS features not on stable yet.
channel = "nightly-2026-05-01"
components = ["rust-src", "rustc-dev", "llvm-tools-preview"]
targets = [
    "aarch64-unknown-none",
    "x86_64-unknown-none",
    "riscv64imac-unknown-none-elf",
    "loongarch64-unknown-none-softfloat",
]
